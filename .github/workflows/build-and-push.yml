name: Build and push

permissions:
  id-token: write
  contents: write

env:
  TZ: 'Asis/Tokyo'

on:
  workflow_dispatch:

jobs:
  create_git_tag:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout/@v4.2.2

      - name: Create git tag
        id: create_tag
        run: |
          TAG_NAME=1.0.$(date +%Y%m%d%H%M%S)
          git tag $TAG_NAME
          git push origin $TAG_NAME
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

  build_and_push:
    needs: create_git_tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout/@v4.2.2

      - name: Login AWS
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          aws-region: ap-northeast-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Docker build
        run: |
          docker build \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com/${{ secrets.REPOSITORY_NAME }}:latest \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com/${{ secrets.REPOSITORY_NAME }}:${{ needs.create_git_tag.outputs.tag_name }} .

      - name: Docker push
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com/${{ secrets.REPOSITORY_NAME }}:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com/${{ secrets.REPOSITORY_NAME }}:${{ needs.create_git_tag.outputs.tag_name }}
